- name: Configurar ferramentas de desenvolvimento no WSL (etapas 9, 10, 11 e 12)
  hosts: localhost
  connection: local
  gather_facts: true
  become: true

  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 600

  vars:
    wsl_user: "{{ lookup('env', 'USER') }}"
    wsl_home: "/home/{{ wsl_user }}"
    status_log_file: "/tmp/wsl_dev_tools_status.log"

    pyenv_python_version: "3.13.12"
    nvm_version: "v0.40.3"
    k9s_version: "v0.50.18"

    kubectl_version: "{{ lookup('ansible.builtin.url', 'https://dl.k8s.io/release/stable.txt') | trim }}"

  pre_tasks:
    - name: Preflight | Remover sources Docker legadas (.list/.sources)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/docker-ce.list
        - /etc/apt/sources.list.d/docker.sources

    - name: Preflight | Remover chave legada docker.gpg
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        state: absent

    - name: Preflight | Limpar linha Docker do sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*download\.docker\.com/linux/ubuntu.*'
        state: absent

  tasks:
    - name: Status | Início da execução
      ansible.builtin.debug:
        msg: "Iniciando playbook em {{ ansible_date_time.iso8601 }}"

    - name: Status | Registrar início em arquivo
      ansible.builtin.lineinfile:
        path: "{{ status_log_file }}"
        create: true
        line: "[{{ ansible_date_time.iso8601 }}] START - Execução iniciada"

    - name: Atualizar cache e pacotes do sistema
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      register: sys_upgrade

    - name: Status | Sistema atualizado
      ansible.builtin.debug:
        msg: "Sistema atualizado (changed={{ sys_upgrade.changed }})"

    # -------------------------
    # 9 PYENV
    # -------------------------
    - name: Status | Iniciando instalação do pyenv
      ansible.builtin.debug:
        msg: "Instalação do pyenv"

    - name: Instalar dependências do pyenv
      ansible.builtin.apt:
        name:
          - make
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libbz2-dev
          - libreadline-dev
          - libsqlite3-dev
          - wget
          - curl
          - llvm
          - libncurses5-dev
          - libncursesw5-dev
          - xz-utils
          - tk-dev
          - libffi-dev
          - liblzma-dev
          - git
        state: present
      register: pyenv_deps

    - name: Instalar pyenv (git clone)
      become: false
      ansible.builtin.git:
        repo: "https://github.com/pyenv/pyenv.git"
        dest: "{{ wsl_home }}/.pyenv"
        version: master
        update: true
      register: pyenv_git

    - name: Garantir configuração do pyenv no .bashrc
      become: false
      ansible.builtin.blockinfile:
        path: "{{ wsl_home }}/.bashrc"
        marker: "# {mark} ANSIBLE PYENV"
        block: |
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
      register: pyenv_bashrc

    - name: Instalar Python via pyenv e definir global
      become: false
      ansible.builtin.shell: |
        set -e
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init -)"
        pyenv install -s {{ pyenv_python_version }}
        pyenv global {{ pyenv_python_version }}
      args:
        executable: /bin/bash
      register: pyenv_python

    - name: Status | Instalação do pyenv concluída
      ansible.builtin.debug:
        msg:
          - "Instalação do pyenv concluída"
          - "pyenv deps changed={{ pyenv_deps.changed }}"
          - "pyenv repo changed={{ pyenv_git.changed }}"
          - "bashrc changed={{ pyenv_bashrc.changed }}"
          - "python via pyenv changed={{ pyenv_python.changed }}"

    # -------------------------
    # 10 NVM
    # -------------------------
    - name: Status | Iniciando instalação do NVM
      ansible.builtin.debug:
        msg: "Iniciando instalação do NVM"

    - name: Instalar NVM
      become: false
      ansible.builtin.shell: |
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ wsl_home }}/.nvm/nvm.sh"
      register: nvm_install

    - name: Garantir configuração do NVM no .bashrc
      become: false
      ansible.builtin.blockinfile:
        path: "{{ wsl_home }}/.bashrc"
        marker: "# {mark} ANSIBLE NVM"
        block: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
      register: nvm_bashrc

    - name: Instalar Node LTS e definir como padrão
      become: false
      ansible.builtin.shell: |
        set -e
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default 'lts/*'
      args:
        executable: /bin/bash
      register: nvm_node

    - name: Status | Instalação do NVM concluída
      ansible.builtin.debug:
        msg:
          - "Instalação do NVM concluída"
          - "nvm install changed={{ nvm_install.changed }}"
          - "nvm bashrc changed={{ nvm_bashrc.changed }}"
          - "node lts changed={{ nvm_node.changed }}"

    # -------------------------
    # 11 Docker Engine
    # -------------------------
    - name: Status | Iniciado instalação do Docker
      ansible.builtin.debug:
        msg: "Iniciado instalação do Docker"

    - name: Instalar dependências do Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      register: docker_deps

    - name: Criar diretório de keyring do APT
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Docker | Remover chave antiga docker.gpg (se existir)
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        state: absent

    - name: Docker | Remover entradas antigas do repositório
      ansible.builtin.shell: |
        set -e
        for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
          [ -f "$f" ] || continue
          if grep -q "download.docker.com/linux/ubuntu" "$f"; then
            sed -i '\|download.docker.com/linux/ubuntu|d' "$f"
          fi
        done
      args:
        executable: /bin/bash

    - name: Baixar chave GPG do Docker (formato .asc)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Docker | Criar source list oficial
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"
        content: |
          deb [arch={{ ansible_architecture | regex_replace('x86_64','amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
      register: docker_repo

    - name: Docker | Atualizar cache APT
      ansible.builtin.apt:
        update_cache: true

    - name: Instalar Docker Engine e plugins
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      register: docker_install

    - name: Adicionar usuário ao grupo docker
      ansible.builtin.user:
        name: "{{ wsl_user }}"
        groups: docker
        append: true
      register: docker_group

    - name: Status | Instalação do Docker concluída
      ansible.builtin.debug:
        msg:
          - "Instalação do Docker concluída"
          - "docker deps changed={{ docker_deps.changed }}"
          - "docker repo changed={{ docker_repo.changed }}"
          - "docker install changed={{ docker_install.changed }}"
          - "docker group changed={{ docker_group.changed }}"

    # -------------------------
    # 12 Minikube, kubectl e k9s
    # -------------------------
    - name: Status | Iniciando instalação de K8s tools
      ansible.builtin.debug:
        msg: "Iniciando instalação de K8s tools"

    - name: Instalar Minikube (binário)
      ansible.builtin.get_url:
        url: https://github.com/kubernetes/minikube/releases/latest/download/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: "0755"
      register: minikube_install

    - name: Instalar kubectl (versão estável)
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
      register: kubectl_install

    - name: Baixar k9s
      ansible.builtin.get_url:
        url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
        dest: /tmp/k9s.tar.gz
        mode: "0644"
      register: k9s_download

    - name: Extrair k9s
      ansible.builtin.unarchive:
        src: /tmp/k9s.tar.gz
        dest: /tmp
        remote_src: true
      register: k9s_extract

    - name: Instalar binário k9s
      ansible.builtin.copy:
        src: /tmp/k9s
        dest: /usr/local/bin/k9s
        mode: "0755"
        remote_src: true
      register: k9s_install

    - name: Limpar arquivos temporários do k9s
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/k9s.tar.gz
        - /tmp/k9s
      register: k9s_cleanup

    - name: Status | Instalação de K8s tools concluída
      ansible.builtin.debug:
        msg:
          - "Instalação de K8s tools concluída"
          - "minikube changed={{ minikube_install.changed }}"
          - "kubectl changed={{ kubectl_install.changed }}"
          - "k9s download changed={{ k9s_download.changed }}"
          - "k9s install changed={{ k9s_install.changed }}"

    - name: Status | Registrar fim em arquivo
      ansible.builtin.lineinfile:
        path: "{{ status_log_file }}"
        create: true
        line: "[{{ ansible_date_time.iso8601 }}] END - Execução finalizada"

    - name: Status | Resumo final
      ansible.builtin.debug:
        msg:
          - "Playbook concluído com sucesso."
          - "Log salvo em {{ status_log_file }}"